name: QuakeGuard CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-ci:
    name: Backend Test & Security
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    - name: Setup Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    # TASK #40: Python Dependency Caching
    - name: Cache Pip Dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('backend-data-elaborator/api/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Python Dependencies & Security Tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety aiohttp ecdsa redis sqlalchemy psycopg2-binary geoalchemy2
        # Install exact requirements to test against vulnerabilities
        if [ -f backend-data-elaborator/api/requirements.txt ]; then pip install -r backend-data-elaborator/api/requirements.txt; fi

    # TASK #41: Backend Security Auditing
    - name: Run Bandit (Static Security Linter)
      run: |
        # Analyze the src directory for insecure code patterns
        bandit -r backend-data-elaborator/api/src

    - name: Run Safety (Dependency Vulnerability Scanner)
      run: |
        # Check requirements for known CVEs
        if [ -f backend-data-elaborator/api/requirements.txt ]; then safety check -r backend-data-elaborator/api/requirements.txt; fi

    # Existing Infrastructure Setup
    - name: Initialize Docker Infrastructure
      env:
        POSTGRES_DB: monitoraggio_db
        POSTGRES_USER: developer
        POSTGRES_PASSWORD: development_pass
        API_PORT: 8000
      run: |
        cd backend-data-elaborator/api
        docker compose up -d --build
        echo "Waiting for database readiness..."
        timeout 30s bash -c 'until docker compose exec -T postgres pg_isready -U developer; do sleep 2; done'
        docker compose ps

    # Existing Stress Test
    - name: Execute Critical Stress Test
      env:
        API_URL: "http://localhost:8000"
        NUM_SENSORS: 150
        CONCURRENCY_LIMIT: 50
      run: |
        cd backend-data-elaborator/api
        export PYTHONPATH=$PYTHONPATH:.
        python -m tests.stress_test

    - name: Retrieve System Logs on Failure
      if: failure()
      run: |
        cd backend-data-elaborator/api
        docker compose logs

  frontend-ci:
    name: Frontend Lint & Audit
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    - name: Setup Node.js Environment
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    # TASK #40: Javascript Dependency Caching
    - name: Cache Node Modules
      uses: actions/cache@v3
      with:
        path: frontend-mobile-app/node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('frontend-mobile-app/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Install JS Dependencies
      run: |
        cd frontend-mobile-app
        npm install

    # TASK #42: Frontend Security Audit
    - name: NPM Security Audit
      run: |
        cd frontend-mobile-app
        # Fails the pipeline if vulnerabilities high or critical are found
        npm audit --audit-level=high

    # TASK #42: Frontend Linting
    - name: ESLint Code Quality Check
      run: |
        cd frontend-mobile-app
        # Run eslint on all JS/TS files
        npx eslint . --ext .js,.jsx,.ts,.tsx