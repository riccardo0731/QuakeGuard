name: IoT CI

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'iot-data-harvester/**'
      - '.github/workflows/iot-ci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'iot-data-harvester/**'
      - '.github/workflows/iot-ci.yml'

jobs:
  iot-ci:
    name: IoT Firmware Build Validation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    - name: Setup Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Cache PlatformIO Packages
      uses: actions/cache@v3
      with:
        path: ~/.platformio
        key: ${{ runner.os }}-pio
        restore-keys: |
          ${{ runner.os }}-pio

    - name: Install PlatformIO CLI
      run: |
        python -m pip install --upgrade pip
        pip install platformio

    - name: Inject CI Environment Variables
      run: |
        cd iot-data-harvester/esp32_code
        cp esp32_config.env.example esp32_config.env

    - name: Validate Firmware Compilation
      run: |
        cd iot-data-harvester/esp32_code
        pio run