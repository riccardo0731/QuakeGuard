name: DevOps CI

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - '.github/workflows/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - '.github/workflows/**'

jobs:
  actionlint:
    name: Validate GitHub Actions Workflows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Run Actionlint
        uses: reviewdog/action-actionlint@v1