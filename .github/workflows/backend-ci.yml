name: Backend CI

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'backend-data-elaborator/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend-data-elaborator/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  backend-ci:
    name: Backend Test & Security
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
    - name: Validate Commit Messages
      uses: wagoid/commitlint-github-action@v5


    - name: Setup Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache Pip Dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('backend-data-elaborator/api/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Python Dependencies & Security Tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety aiohttp ecdsa redis sqlalchemy psycopg2-binary geoalchemy2
        if [ -f backend-data-elaborator/api/requirements.txt ]; then pip install -r backend-data-elaborator/api/requirements.txt; fi

    - name: Run Bandit (Static Security Linter)
      run: bandit -r backend-data-elaborator/api/src

    - name: Run Safety (Dependency Vulnerability Scanner)
      run: if [ -f backend-data-elaborator/api/requirements.txt ]; then safety check -r backend-data-elaborator/api/requirements.txt; fi

    - name: Initialize Docker Infrastructure
      env:
        POSTGRES_DB: ${{ secrets.CI_POSTGRES_DB }}
        POSTGRES_USER: ${{ secrets.CI_POSTGRES_USER }}
        POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
        API_PORT: 8000
      run: |
        cd backend-data-elaborator/api
        docker compose up -d --build
        echo "Waiting for database readiness..."
        # Updated to use the secret reference for the user flag
        timeout 30s bash -c 'until docker compose exec -T postgres pg_isready -U ${{ secrets.CI_POSTGRES_USER }}; do sleep 2; done'
        docker compose ps

    - name: Execute Critical Stress Test
      env:
        API_URL: "http://localhost:8000"
        NUM_SENSORS: 150
        CONCURRENCY_LIMIT: 50
      run: |
        cd backend-data-elaborator/api
        export PYTHONPATH=$PYTHONPATH:.
        python -m tests.stress_test

    - name: Retrieve System Logs on Failure
      if: failure()
      run: |
        cd backend-data-elaborator/api
        docker compose logs