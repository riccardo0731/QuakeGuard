name: Backend CI

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'backend-data-elaborator/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend-data-elaborator/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  backend-ci:
    name: Backend Test & Security
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      
    - name: Validate Commit Messages
      uses: wagoid/commitlint-github-action@v5

    - name: Setup Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache Pip Dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('backend-data-elaborator/api/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Python Dependencies & Security Tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety aiohttp cryptography redis sqlalchemy psycopg2-binary geoalchemy2 aiomqtt
        if [ -f backend-data-elaborator/api/requirements.txt ]; then pip install -r backend-data-elaborator/api/requirements.txt; fi

    - name: Run Bandit (Static Security Linter)
      run: bandit -r backend-data-elaborator/api/src

    - name: Run Safety (Dependency Vulnerability Scanner)
      env:
        SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}
      run: |
        if [ -f backend-data-elaborator/api/requirements.txt ]; then 
          safety scan -r backend-data-elaborator/api/requirements.txt
        fi

    - name: Initialize Docker Infrastructure
      env:
        POSTGRES_DB: ${{ secrets.CI_POSTGRES_DB }}
        POSTGRES_USER: ${{ secrets.CI_POSTGRES_USER }}
        POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
        IOT_API_KEY: "ci-test-key-123"
        MOBILE_WS_TOKEN: "ci-ws-token-456"
        ENROLLMENT_TOKEN: "ci-enroll-token-789"
        API_PORT: 8000
        MQTT_PORT: 1883  # 1. FIXED: Added so docker-compose can map the broker port outwards
      run: |
        cd backend-data-elaborator/api
        docker compose up -d --build
        
        echo "Waiting for database readiness..."
        timeout 30s bash -c 'until docker compose exec -T postgres pg_isready -U ${{ secrets.CI_POSTGRES_USER }}; do sleep 2; done'
        
        echo "Waiting for MQTT Broker readiness..."
        timeout 30s bash -c 'until nc -z localhost 1883; do sleep 1; done' # 2. FIXED: Prevents race conditions
        
        docker compose ps

    - name: Execute Critical Stress Test
      env:
        API_URL: "http://localhost:8000"
        NUM_SENSORS: 150
        CONCURRENCY_LIMIT: 50
        IOT_API_KEY: "ci-test-key-123"
        MQTT_BROKER: "localhost" # 3. FIXED: Explicitly forces aiomqtt to target the host pipeline
        MQTT_PORT: 1883          # 4. FIXED: Explicitly passes port to stress test runtime
      run: |
        cd backend-data-elaborator/api
        export PYTHONPATH=$PYTHONPATH:.
        python -m tests.stress_test

    - name: Retrieve System Logs on Failure
      if: failure()
      run: |
        cd backend-data-elaborator/api
        docker compose logs